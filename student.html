<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나래국 인생게임</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --border: #2a2a4a;
    --accent: #e8b86d;
    --accent2: #7c6af0;
    --danger: #e05c5c;
    --safe: #5cb8e0;
    --equal: #5ce0a0;
    --text: #f0ede8;
    --muted: #8a8aaa;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  /* 헤더 */
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .header .label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 900;
    line-height: 1.2;
  }
  .header h1 span { color: var(--accent); }

  /* 진행 바 */
  .progress-bar {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
  }
  .progress-dot {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    transition: background 0.4s;
  }
  .progress-dot.done { background: var(--accent); }
  .progress-dot.active { background: var(--accent2); }

  /* 장면 카드 */
  .scene-card {
    width: 100%;
    max-width: 480px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px;
    margin-bottom: 20px;
  }
  .scene-number {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .scene-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .scene-story {
    font-size: 14px;
    line-height: 1.8;
    color: #ccc;
    margin-bottom: 16px;
  }
  .speech-bubble {
    background: #16213e;
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--accent);
    font-style: italic;
    margin-bottom: 20px;
  }
  .question {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
  }

  /* 선택지 버튼 */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    background: #12122a;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 600;
    line-height: 1.5;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    position: relative;
  }
  .choice-btn:hover { border-color: var(--accent2); background: #1a1a3a; }
  .choice-btn.selected {
    border-color: var(--accent);
    background: #1e1a0a;
    color: var(--accent);
  }
  .choice-btn:disabled { opacity: 0.5; cursor: default; }
  .choice-label {
    display: inline-block;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--border);
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    line-height: 22px;
    margin-right: 10px;
    flex-shrink: 0;
  }
  .choice-btn.selected .choice-label {
    background: var(--accent);
    color: #000;
  }

  /* 확인 버튼 */
  .confirm-btn {
    width: 100%;
    max-width: 480px;
    padding: 16px;
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .confirm-btn.visible { display: block; }
  .confirm-btn:hover { background: #9580ff; transform: translateY(-1px); }
  .confirm-btn:active { transform: translateY(0); }

  /* 대기 화면 — 좌우 2단 */
  .waiting {
    display: none;
    width: 100%;
    max-width: 480px;
  }
  .waiting.visible { display: block; }
  .waiting-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    align-items: start;
  }
  .waiting-left {
    text-align: center;
    padding: 30px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  .waiting-icon { font-size: 44px; margin-bottom: 12px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .waiting h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .waiting p { color: var(--muted); font-size: 13px; line-height: 1.6; }

  /* ★ 점수 공개 카드 — 오른쪽 */
  .score-reveal {
    display: none;
    background: #12122a;
    border: 1.5px solid #2a2a4a;
    border-radius: 16px;
    padding: 18px 16px;
    animation: fadeIn 0.5s ease;
  }
  .score-reveal.visible { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }
  .score-reveal .reveal-title {
    font-size: 13px; color: #8a8aaa;
    letter-spacing: 1px; margin-bottom: 14px;
  }
  .score-chips { display: flex; flex-direction: column; gap: 10px; }
  .score-chip-row {
    display: flex; align-items: center;
    background: #0f0f1e; border-radius: 10px;
    padding: 10px 14px; gap: 10px;
  }
  .score-chip-icon { font-size: 18px; }
  .score-chip-name { font-size: 14px; font-weight: 700; flex: 1; }
  .score-chip-name.freedom { color: #5ce0a0; }
  .score-chip-name.safety  { color: #5cb8e0; }
  .score-chip-name.equal   { color: #e8b86d; }
  .score-chip-val {
    font-size: 16px; font-weight: 900;
    min-width: 44px; text-align: right;
  }
  .score-chip-val.plus  { color: #5ce0a0; }
  .score-chip-val.minus { color: #e05c5c; }
  .score-chip-val.zero  { color: #6a6a8a; }

  /* ★ 누적 합계 */
  .total-scores {
    margin-top: 14px;
    background: #0a0a1a;
    border: 1px solid #2a2a4a;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .total-title {
    font-size: 11px; letter-spacing: 2px;
    color: #6a6a8a; margin-bottom: 10px;
    text-align: center;
  }
  .total-row {
    display: flex; align-items: center;
    gap: 8px; margin-bottom: 8px;
  }
  .total-bar-wrap {
    flex: 1; height: 6px;
    background: #1a1a2e; border-radius: 3px; overflow: hidden;
  }
  .total-bar { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
  .total-bar.freedom { background: #5ce0a0; }
  .total-bar.safety  { background: #5cb8e0; }
  .total-bar.equal   { background: #e8b86d; }
  .total-name { font-size: 12px; font-weight: 700; width: 50px; }
  .total-name.freedom { color: #5ce0a0; }
  .total-name.safety  { color: #5cb8e0; }
  .total-name.equal   { color: #e8b86d; }
  .total-val { font-size: 13px; font-weight: 900; width: 32px; text-align: right; }

  /* 완료 화면 */
  .done-screen {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }
  .done-screen.visible { display: block; }
  .done-icon { font-size: 64px; margin-bottom: 20px; }
  .done-screen h2 { font-size: 22px; font-weight: 900; margin-bottom: 10px; }
  .done-screen p { color: var(--muted); font-size: 14px; line-height: 1.7; }

  /* 스탯 미니 표시 */
  .stat-mini {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    justify-content: center;
  }
  .stat-chip {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }
  .stat-chip.freedom { background: rgba(92,224,160,0.15); color: var(--equal); }
  .stat-chip.safety  { background: rgba(92,184,224,0.15); color: var(--safe); }
  .stat-chip.equal   { background: rgba(232,184,109,0.15); color: var(--accent); }

  /* 이름 입력 */
  .name-screen {
    width: 100%;
    max-width: 480px;
    text-align: center;
  }
  .name-screen h2 { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
  .name-screen p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .name-input {
    width: 100%;
    padding: 16px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 18px;
    font-family: 'Noto Sans KR', sans-serif;
    text-align: center;
    margin-bottom: 16px;
    outline: none;
  }
  .name-input:focus { border-color: var(--accent2); }
  .start-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    cursor: pointer;
  }
  .start-btn:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>

<div class="header">
  <div class="label">나래국 인생게임</div>
  <h1>나는 <span>나래국</span>의 국민</h1>
</div>

<!-- 이름 입력 화면 -->
<div class="name-screen" id="nameScreen">
  <h2>👤 내 이름을 입력하세요</h2>
  <p>선택 결과가 나래국의 미래를 결정합니다</p>
  <input class="name-input" id="nameInput" type="text" placeholder="예) 김민준" maxlength="6">
  <button class="start-btn" id="startBtn" disabled onclick="startGame()">게임 시작</button>
</div>

<!-- 진행 바 -->
<div class="progress-bar" id="progressBar" style="display:none">
  <div class="progress-dot" id="dot0"></div>
  <div class="progress-dot" id="dot1"></div>
  <div class="progress-dot" id="dot2"></div>
  <div class="progress-dot" id="dot3"></div>
  <div class="progress-dot" id="dot4"></div>
</div>

<!-- 장면 카드 -->
<div class="scene-card" id="sceneCard" style="display:none"></div>
<button class="confirm-btn" id="confirmBtn" onclick="submitChoice()">선택 완료 →</button>

<!-- 대기 화면 -->
<div class="waiting" id="waitingScreen">
  <div class="waiting-inner">
    <!-- 왼쪽: 대기 메시지 -->
    <div class="waiting-left">
      <div class="waiting-icon">⏳</div>
      <h2>선생님을<br>기다리는 중</h2>
      <p>선생님이 결과를<br>공개하면 내 점수가<br>오른쪽에 나타나요</p>
    </div>
    <!-- 오른쪽: 점수 공개 -->
    <div class="score-reveal" id="scoreReveal">
      <div class="reveal-title">✨ 이번 장면</div>
      <div class="score-chips" id="scoreChips"></div>
      <div class="total-scores" id="totalScores">
        <div class="total-title">📊 누적 점수</div>
        <div class="total-row">
          <span class="total-name freedom">🗽 자유</span>
          <div class="total-bar-wrap"><div class="total-bar freedom" id="tBarFreedom" style="width:50%"></div></div>
          <span class="total-val" id="tValFreedom">0</span>
        </div>
        <div class="total-row">
          <span class="total-name safety">🛡 안전</span>
          <div class="total-bar-wrap"><div class="total-bar safety" id="tBarSafety" style="width:50%"></div></div>
          <span class="total-val" id="tValSafety">0</span>
        </div>
        <div class="total-row">
          <span class="total-name equal">⚖️ 평등</span>
          <div class="total-bar-wrap"><div class="total-bar equal" id="tBarEqual" style="width:50%"></div></div>
          <span class="total-val" id="tValEqual">0</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 완료 화면 -->
<div class="done-screen" id="doneScreen">
  <div class="done-icon">🏛️</div>
  <h2>나래국에서의 선택이<br>끝났습니다</h2>
  <p>선생님 화면을 함께 봐요</p>
  <div class="stat-mini" id="myStats"></div>
</div>

<script type="module">

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 게임 데이터 ──────────────────────────────────────────
const SCENES = [

      { label: "A", text: "맞아, 빠르고 확실한 게 낫지. 믿어보자.", scores: { freedom: -1, safety: 1, equal: 0 } },
      { label: "B", text: "한 사람이 다 하면 나중에 문제가 생길 것 같아. 반대한다.", scores: { freedom: 1, safety: -1, equal: 0 } }
    ]
  },
  {
    number: "장면 2",
    title: "안전을 위한 법",

    speech: "\"국민 여러분의 안전을 위해, 수상한 사람은 재판 없이 먼저 잡아둘 수 있는 법을 만들었습니다. 억울한 사람은 나중에 풀어드리면 됩니다. 나쁜 사람을 빨리 잡는 게 먼저 아닐까요?\"",

      { label: "B", text: "재판도 없이 잡아두는 건 말이 안 돼. 항의한다.", scores: { freedom: 1, safety: -1, equal: 1 } }

    question: "💬 이 재판을 받아들일까?",
    choices: [
      { label: "A", text: "판사가 지도자 편이면 공정한 재판이 아니야. 계속 싸운다.", scores: { freedom: 1, safety: -1, equal: 1 } },
      { label: "B", text: "70%가 뽑은 지도자니까... 어쩔 수 없다. 벌금을 낸다.", scores: { freedom: -1, safety: 1, equal: -1 } }

  {

    title: "강한의 호소",
    story: "나래국 경제가 어려워졌습니다. 강한이 방송에 나와 말합니다.",
    speech: "\"국민 여러분, 지금 나래국이 어려운 건 저를 반대하는 세력들이 발목을 잡기 때문입니다. 저를 믿고 조금만 더 참아주세요. 비판하는 목소리가 클수록 나래국은 더 힘들어집니다.\"",
    question: "💬 나는 어떻게 생각할까?",
    choices: [
      { label: "A", text: "맞아, 지금은 단결해야 할 때야. 비판을 멈춘다.", scores: { freedom: -1, safety: 1, equal: -1 } },
      { label: "B", text: "어려울수록 비판의 목소리가 필요해. 계속 말한다.", scores: { freedom: 1, safety: -1, equal: 0 } },

    speech: "\"여러분의 마음 압니다. 저도 답답합니다. 하지만 지금 이 문제들, 제가 다 해결할 수 있습니다. 조금만 더 믿어주세요. 대신 저에게 더 많은 권한을 주세요. 그러면 나래국을 반드시 바로잡겠습니다.\"",
    question: "💬 나는 어떻게 할까?",
    choices: [
      { label: "A", text: "더 많은 권한을 주면 오히려 더 위험해질 것 같아. 광장에 남는다.", scores: { freedom: 1, safety: -1, equal: 1 } },
      { label: "B", text: "지금 이 상황을 빨리 해결하려면 어쩔 수 없다. 권한을 준다.", scores: { freedom: -1, safety: 1, equal: -1 } },
      { label: "C", text: "광장엔 못 가지만 주변 사람들에게 조용히 알린다.", scores: { freedom: 1, safety: 0, equal: 0 } }

// ── 상태 ────────────────────────────────────────────────
let studentName = "";
let currentScene = 0;
let selectedChoice = null;
let myScores = { freedom: 0, safety: 0, equal: 0 };
let gamePhase = 0; // Firebase에서 받아오는 현재 장면 번호

// ── 이름 입력 ────────────────────────────────────────────
const nameInput = document.getElementById('nameInput');
nameInput.addEventListener('input', () => {
  document.getElementById('startBtn').disabled = nameInput.value.trim().length === 0;
});

window.startGame = function() {
  studentName = nameInput.value.trim();
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('progressBar').style.display = 'flex';
  document.getElementById('sceneCard').style.display = 'block';

  // Firebase 장면 번호 감지
  onValue(ref(db, 'game/currentScene'), (snap) => {
    const serverScene = snap.val() ?? 0;
    gamePhase = serverScene;
    if (serverScene >= SCENES.length) {
      showDone();
    } else if (serverScene === currentScene) {
      renderScene(currentScene);
    } else if (serverScene > currentScene) {
      // 선생님이 다음 장면으로 넘겼을 때
      currentScene = serverScene;
      selectedChoice = null;
      // 점수 공개 초기화
      document.getElementById('scoreReveal').classList.remove('visible');
      hideWaiting();
      renderScene(currentScene);
    }
  });

  // ★ 선생님 결과 공개 감지
  onValue(ref(db, 'game/revealed'), (snap) => {
    const revealed = snap.val() || {};
    const key = `scene${currentScene}`;
    if (revealed[key] === true) {
      showMyScores();
    }
  });
};

// ── 장면 렌더링 ──────────────────────────────────────────
function renderScene(idx) {
  const s = SCENES[idx];
  updateProgress(idx);

  const card = document.getElementById('sceneCard');
  card.innerHTML = `
    <div class="scene-number">${s.number} / 5</div>
    <div class="scene-title">${s.title}</div>
    <div class="scene-story">${s.story}</div>
    <div class="speech-bubble">${s.speech}</div>
    <div class="question">${s.question}</div>
    <div class="choices" id="choiceList"></div>
  `;

  const list = document.getElementById('choiceList');
  s.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${c.label}</span>${c.text}`;
    btn.onclick = () => selectChoice(i);
    list.appendChild(btn);
  });

  document.getElementById('confirmBtn').classList.remove('visible');
  selectedChoice = null;
}

function selectChoice(i) {
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.classList.remove('selected'));
  btns[i].classList.add('selected');
  selectedChoice = i;
  document.getElementById('confirmBtn').classList.add('visible');
}

// ── 선택 제출 ────────────────────────────────────────────
window.submitChoice = async function() {
  if (selectedChoice === null) return;
  const scene = SCENES[currentScene];
  const scores = scene.choices[selectedChoice].scores;

  // 내 누적 점수
  myScores.freedom += scores.freedom;
  myScores.safety  += scores.safety;
  myScores.equal   += scores.equal;
  // ★ 이번 장면 점수 임시 저장 (공개용)
  window._lastScores = scores;

  // Firebase에 기록
  await push(ref(db, `game/responses/scene${currentScene}`), {
    name: studentName,
    choice: scene.choices[selectedChoice].label,
    freedom: scores.freedom,
    safety: scores.safety,
    equal: scores.equal,
    timestamp: Date.now()
  });

  // 버튼 비활성화
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  document.getElementById('confirmBtn').style.display = 'none';
  showWaiting();
};

function showWaiting() {
  document.getElementById('waitingScreen').classList.add('visible');
}
function hideWaiting() {
  document.getElementById('waitingScreen').classList.remove('visible');
}

function updateProgress(idx) {
  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById(`dot${i}`);
    dot.className = 'progress-dot' + (i < idx ? ' done' : i === idx ? ' active' : '');
  }
}

// ★ 선생님이 공개 버튼 누르면 내 점수 표시
function showMyScores() {
  const scores = window._lastScores;
  if (!scores) return;
  const reveal = document.getElementById('scoreReveal');
  if (reveal.classList.contains('visible')) return; // 이미 표시됨
  
  const chips = document.getElementById('scoreChips');
  chips.innerHTML = [
    { icon: '🗽', name: '자유', key: 'freedom', cls: 'freedom' },
    { icon: '🛡', name: '안전', key: 'safety',  cls: 'safety'  },
    { icon: '⚖️', name: '평등', key: 'equal',   cls: 'equal'   }
  ].map(item => {
    const val = scores[item.key];
    const sign = val > 0 ? '+' : '';
    const valCls = val > 0 ? 'plus' : val < 0 ? 'minus' : 'zero';
    return `
      <div class="score-chip-row">
        <span class="score-chip-icon">${item.icon}</span>
        <span class="score-chip-name ${item.cls}">${item.name}</span>
        <span class="score-chip-val ${valCls}">${sign}${val}</span>
      </div>`;
  }).join('');
  
  reveal.classList.add('visible');

  // ★ 누적 합계 업데이트
  const f = myScores.freedom;
  const sa = myScores.safety;
  const e = myScores.equal;
  const max = Math.max(Math.abs(f), Math.abs(sa), Math.abs(e), 1);

  document.getElementById('tValFreedom').textContent = (f > 0 ? '+' : '') + f;
  document.getElementById('tValSafety').textContent  = (sa > 0 ? '+' : '') + sa;
  document.getElementById('tValEqual').textContent   = (e > 0 ? '+' : '') + e;

  document.getElementById('tBarFreedom').style.width = Math.max(5, 50 + f  / max * 45) + '%';
  document.getElementById('tBarSafety').style.width  = Math.max(5, 50 + sa / max * 45) + '%';
  document.getElementById('tBarEqual').style.width   = Math.max(5, 50 + e  / max * 45) + '%';
}

function showDone() {
  document.getElementById('sceneCard').style.display = 'none';
  document.getElementById('confirmBtn').style.display = 'none';
  document.getElementById('waitingScreen').classList.remove('visible');
  document.getElementById('progressBar').style.display = 'none';

  const done = document.getElementById('doneScreen');
  done.classList.add('visible');

  document.getElementById('myStats').innerHTML = `
    <span class="stat-chip freedom">🗽 자유 ${myScores.freedom > 0 ? '+' : ''}${myScores.freedom}</span>
    <span class="stat-chip safety">🛡 안전 ${myScores.safety > 0 ? '+' : ''}${myScores.safety}</span>
    <span class="stat-chip equal">⚖️ 평등 ${myScores.equal > 0 ? '+' : ''}${myScores.equal}</span>
  `;
}
</script>
</body>
</html>
